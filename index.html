<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GIVE IT ALL — Page Preview</title>
  <meta name="robots" content="noindex">
  <style>
    html,body{margin:0;padding:0;background:#061938;}
    /* dev-only preview switcher (never shipped to Wix) */
    .preview-switch{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:99999;
      display:flex;gap:4px;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:12px;
      background:rgba(4,18,42,.82);border:1px solid rgba(232,198,95,.4);border-radius:999px;
      padding:5px;backdrop-filter:blur(8px);box-shadow:0 8px 24px -10px rgba(0,0,0,.7);}
    .preview-switch a{color:#B1BFD7;text-decoration:none;padding:6px 16px;border-radius:999px;font-weight:600;letter-spacing:.02em;transition:background .15s,color .15s;}
    .preview-switch a:hover{color:#F4F6FB;}
    .preview-switch a.on{background:#E8C65F;color:#061938;}
  </style>
</head>
<body>
  <nav class="preview-switch" aria-label="Preview page switcher">
    <a href="?page=event">Event</a>
    <a href="?page=partners">Partners</a>
  </nav>
  <div id="mount"></div>
  <script>
    var pages = {
      event:    { tag:'gia-event-page',    src:'gia-event-page.js'    },
      partners: { tag:'gia-partners-page', src:'gia-partners-page.js' }
    };
    var key = new URLSearchParams(location.search).get('page');
    if (!pages[key]) key = 'event';                 // default keeps root = event page
    var p = pages[key];
    document.getElementById('mount').appendChild(document.createElement(p.tag));
    var s = document.createElement('script'); s.src = p.src; document.body.appendChild(s);
    var active = document.querySelector('.preview-switch a[href="?page=' + key + '"]');
    if (active) active.classList.add('on');
    document.title = 'GIVE IT ALL — ' + key + ' preview';
  </script>
</body>
</html>
